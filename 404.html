<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AlphaX | Página não encontrada</title>
    <meta name="robots" content="noindex, nofollow">
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, "");
        var hasBase = path.indexOf("/alphax-app/") === 0;
        var base = hasBase ? "/alphax-app" : "";
        var normalized = hasBase ? path.replace("/alphax-app", "") : path;
        var legacySupport = ["/suport", "/suporte", "/suport/suporte"];

        if (legacySupport.indexOf(normalized) !== -1) {
          window.location.replace(base + "/support/");
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #090b13;
        color: #f7f8fc;
      }

      main {
        width: min(560px, 100%);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: rgba(18, 22, 32, 0.9);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 7vw, 52px);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: #b9c0d0;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 8px;
        background: linear-gradient(135deg, #f3b94d, #ffd978);
        color: #211504;
        font-weight: 750;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Página não encontrada</h1>
      <p>O endereço acessado não existe ou foi movido. Use o suporte para encontrar o caminho correto.</p>
      <a href="/alphax-app/support/">Abrir suporte</a>
    </main>
  </body>
</html>
